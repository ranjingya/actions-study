services:
  shellcrash-web:
    image: nginx:alpine
    container_name: shellcrash-web
    restart: unless-stopped
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "80"
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-network
      traefik.http.routers.shellcrash.rule: "Host(`shellcrash.kktree.cn`)"
      traefik.http.routers.shellcrash.entrypoints: websecure
      traefik.http.routers.shellcrash.tls: "true"
      traefik.http.routers.shellcrash.tls.certresolver: myresolver
      traefik.http.services.shellcrash.loadbalancer.server.port: 80
    networks:
      - traefik-network

networks:
  traefik-network:
    external: true